[project]
name = "animal-shelter"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Ruben Sanderson", email = "sanderson.ruben@ah.nl" }
]
requires-python = ">=3.13"
dependencies = [
    "pandas>=3.0.2",
]

